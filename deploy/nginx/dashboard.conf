server {
    listen 80;
    server_name api.worksphere.ltd;

    # Increase max body size to handle large file uploads (base64 encoded in JSON)
    # 50MB should be sufficient for multiple files
    client_max_body_size 50M;
    client_body_buffer_size 128k;

    # WebSocket support for WebRTC signaling
    # This endpoint requires special handling for WebSocket upgrade
    location /ws {
        proxy_pass http://127.0.0.1:8080/ws;
        proxy_http_version 1.1;
        
        # WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts for long-lived WebSocket connections
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 10s;
        
        # Disable buffering for WebSocket
        proxy_buffering off;
    }

    # API proxy - forward all other requests to backend
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;

        # Disable caching for index.html/root to ensure latest version is served
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        if_modified_since off;
        expires off;
        etag off;
        
        # Increase buffer sizes for large requests
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        
        # Let backend handle CORS - remove duplicate headers that might conflict
        # Backend CORS configuration is more secure and properly validates origins
    }

    # ACME challenge for certbot
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }
}